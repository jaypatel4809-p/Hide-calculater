<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hide Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#050507; 
    --surface:#121217; --surface2:#181822;
    --border:#222230; --accent:#00e5b0; --text:#e8e8f0;
    --muted:#555570; --danger:#ff4466; --display-bg:#000000;
    /* Neon Glow Colors */
    --glow-accent: rgba(0, 229, 176, 0.8);
    --glow-op: rgba(167, 139, 250, 0.8);
    --glow-fn: rgba(232, 232, 240, 0.5);
  }
  body {
    background:var(--bg);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Rajdhani',sans-serif;
  }

  /* CALCULATOR WRAPPER */
  #calc-wrap {
    width:340px;
  }

  /* DISPLAY WITH NEON GLOW */
  .display {
    background:var(--display-bg);
    border: 1px solid var(--accent);
    box-shadow: 0 0 20px rgba(0, 229, 176, 0.3), inset 0 0 15px rgba(0, 229, 176, 0.15);
    border-radius:14px;
    padding:14px 18px;
    margin-bottom:12px;
    min-height:86px;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    justify-content:flex-end;
    position:relative;
  }
  .mem-tag {
    position:absolute; top:10px; left:14px;
    font-family:'Share Tech Mono',monospace;
    font-size:10px; color:#fff;
    text-shadow: 0 0 5px #fff, 0 0 10px var(--accent);
    display:none;
  }
  .mem-tag.show { display:block; }
  .hist {
    font-family:'Share Tech Mono',monospace;
    font-size:12px; color:var(--muted);
    min-height:15px; margin-bottom:4px;
  }
  
  .num-display {
    font-family:'Share Tech Mono',monospace;
    font-size:36px; 
    color: #ffffff; 
    text-shadow: 
      0 0 5px #fff, 
      0 0 15px var(--accent), 
      0 0 30px var(--accent), 
      0 0 50px var(--glow-accent);
    word-break:break-all; text-align:right;
  }
  .num-display.sm { font-size:24px; }
  .num-display.xs { font-size:17px; }

  /* TOGGLE STRIP */
  .toggle-strip {
    display:flex;
    justify-content:flex-end;
    margin-bottom:8px;
  }
  #moreBtn {
    background:rgba(0,229,176,0.05);
    border:1px solid rgba(0,229,176,0.25);
    border-radius:8px;
    color:var(--accent);
    font-family:'Share Tech Mono',monospace;
    font-size:11px;
    padding:5px 14px;
    cursor:pointer;
    letter-spacing:1px;
    transition: all 0.2s;
  }
  #moreBtn:hover, #moreBtn.active {
    background:rgba(0,229,176,0.15);
    border-color:var(--accent);
    box-shadow: 0 0 10px var(--glow-accent);
    color: #fff;
    text-shadow: 0 0 8px var(--accent);
  }

  /* EXTRA ROWS */
  #extraRows { display:none; }

  /* BUTTON ROWS */
  .row {
    display:flex;
    gap:8px;
    margin-bottom:8px;
  }
  .row:last-child { margin-bottom:0; }

  /* GLOWING BUTTONS BASE */
  .btn {
    flex:1;
    border:none;
    border-radius:10px;
    height:58px;
    font-family:'Rajdhani',sans-serif;
    font-size:22px; 
    font-weight:700;
    cursor:pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn:active { transform:scale(0.94); opacity:0.9; }

  /* =========================================
     NORMAL DEFAULT, EXTREME HOVER FOR NUMBERS
     ========================================= */
  .btn.num  { 
    background: var(--surface2); 
    color: var(--text); 
    border: 1px solid var(--border); 
    text-shadow: 0 0 2px rgba(232, 232, 240, 0.2); 
    box-shadow: none; 
  }
  .btn.num:hover {
    background: rgba(255, 255, 255, 0.2);
    border-color: #ffffff;
    color: #ffffff;
    text-shadow: 0 0 10px #fff, 0 0 25px #fff, 0 0 40px #fff; 
    box-shadow: 0 0 25px rgba(255, 255, 255, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.4);
  }
  .btn.zero { flex:2.05; }

  /* OPERATOR KEYS GLOW (+, -, ×, ÷) */
  .btn.op   { 
    background:rgba(124,58,237,0.15); 
    color:#d8b4fe; 
    border:1px solid rgba(124,58,237,0.5); 
    text-shadow: 0 0 5px #a78bfa;
    box-shadow: 0 0 8px rgba(124,58,237,0.2);
  }
  .btn.op:hover {
    background:rgba(124,58,237,0.3);
    border-color:#e9d5ff;
    color:#ffffff;
    box-shadow: 0 0 20px var(--glow-op), inset 0 0 10px rgba(124,58,237,0.4);
    text-shadow: 0 0 10px #fff, 0 0 25px #c4b5fd;
  }

  /* FUNCTION KEYS GLOW (C, ⌫, %) */
  .btn.fn   { 
    background:rgba(232, 232, 240, 0.08); 
    color:#ffffff; 
    border:1px solid rgba(232, 232, 240, 0.3); 
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
  }
  .btn.fn:hover {
    border-color: #ffffff;
    background:rgba(232, 232, 240, 0.15);
    color:#ffffff;
    box-shadow: 0 0 18px rgba(255,255,255,0.4);
    text-shadow: 0 0 10px #fff, 0 0 20px #fff;
  }

  /* EQUALS KEY SUPER GLOW (=) */
  .btn.eq   { 
    background: linear-gradient(135deg,#00e5b0,#00b8ff); 
    color:#000; 
    font-size:28px; 
    font-weight:700;
    box-shadow: 0 0 18px rgba(0, 229, 176, 0.5);
  }
  .btn.eq:hover {
    color: #fff;
    text-shadow: 0 0 10px #fff;
    box-shadow: 0 0 30px rgba(0, 229, 176, 0.9), 0 0 50px rgba(0, 184, 255, 0.6);
  }

  /* =========================================
     SCI BUTTONS - NORMAL DEFAULT, GLOW ON HOVER
     ========================================= */
  .sbtn {
    flex:1;
    border:none;
    border-radius:8px;
    height:44px;
    font-family:'Share Tech Mono',monospace;
    font-size:13px; font-weight:600;
    cursor:pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sbtn:active { transform:scale(0.94); }
  
  /* Extra keys default (Normal/Ocho Glow) */
  .sbtn.mem  { background:rgba(249,115,22,0.05); color:#fdba74; border:1px solid rgba(249,115,22,0.2); text-shadow:none; }
  .sbtn.trig { background:rgba(59,130,246,0.05); color:#93c5fd; border:1px solid rgba(59,130,246,0.2); text-shadow:none;}
  .sbtn.log  { background:rgba(234,179,8,0.05); color:#fde047; border:1px solid rgba(234,179,8,0.2); text-shadow:none;}
  .sbtn.misc { background:rgba(236,72,153,0.05); color:#f9a8d4; border:1px solid rgba(236,72,153,0.2); text-shadow:none;}

  /* Extra keys Hover (Full Glow) */
  .sbtn.mem:hover { border-color:#fff; color:#fff; text-shadow:0 0 10px #fdba74; box-shadow: 0 0 15px rgba(249,115,22,0.6); }
  .sbtn.trig:hover { border-color:#fff; color:#fff; text-shadow:0 0 10px #93c5fd; box-shadow: 0 0 15px rgba(59,130,246,0.6); }
  .sbtn.log:hover { border-color:#fff; color:#fff; text-shadow:0 0 10px #fde047; box-shadow: 0 0 15px rgba(234,179,8,0.6); }
  .sbtn.misc:hover { border-color:#fff; color:#fff; text-shadow:0 0 10px #f9a8d4; box-shadow: 0 0 15px rgba(236,72,153,0.6); }

  /* VAULT */
  #vault { display:none; position:fixed; inset:0; background:var(--bg); z-index:100; flex-direction:column; }
  #vault.open { display:flex; }
  .v-header { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .v-logo { display:flex; align-items:center; gap:10px; }
  .v-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--accent),#00b8ff); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; }
  .v-title { font-size:18px; font-weight:700; color:var(--text); letter-spacing:1px; }
  .v-title span { color:#fff; text-shadow: 0 0 8px var(--accent), 0 0 15px var(--glow-accent); }
  .lock-btn { padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600; cursor:pointer; }
  .v-tabs { display:flex; padding:12px 20px 0; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .vtab { padding:8px 16px; font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.15s; }
  .vtab.on { color:#fff; border-bottom-color:var(--accent); text-shadow: 0 0 8px var(--accent); }
  .v-body { flex:1; overflow-y:auto; padding:20px; }
  .v-body::-webkit-scrollbar { width:3px; }
  .v-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .panel { display:none; }
  .panel.on { display:block; }
  .upzone { border:2px dashed var(--border); border-radius:14px; padding:34px; text-align:center; cursor:pointer; position:relative; margin-bottom:16px; }
  .upzone:hover { border-color:var(--accent); box-shadow: 0 0 15px rgba(0, 229, 176, 0.2); }
  .upzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .upzone .ico { font-size:34px; margin-bottom:8px; }
  .upzone p { font-size:14px; color:var(--muted); }
  .upzone strong { color:var(--accent); text-shadow: 0 0 5px var(--glow-accent); }
  .photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; }
  .photo-item { position:relative; aspect-ratio:1; border-radius:10px; overflow:hidden; border:1px solid var(--border); cursor:pointer; }
  .photo-item img { width:100%; height:100%; object-fit:cover; }
  .photo-del { position:absolute; top:5px; right:5px; width:26px; height:26px; background:rgba(255,68,102,0.9); border:none; border-radius:50%; color:#fff; font-size:13px; cursor:pointer; opacity:0; transition:opacity 0.15s; }
  .photo-item:hover .photo-del { opacity:1; }
  .file-list { display:flex; flex-direction:column; gap:8px; }
  .file-item { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:11px 14px; display:flex; align-items:center; gap:10px; }
  .file-ico { font-size:22px; }
  .file-info { flex:1; min-width:0; }
  .file-name { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .file-size { font-size:11px; color:var(--muted); }
  .file-del { background:none; border:none; color:var(--danger); font-size:17px; cursor:pointer; opacity:0.5; }
  .file-del:hover { opacity:1; }
  .note-area { display:flex; gap:9px; margin-bottom:14px; }
  .note-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:11px 14px; color:var(--text); font-family:'Rajdhani',sans-serif; font-size:15px; resize:none; min-height:72px; outline:none; }
  .note-input:focus { border-color:var(--accent); box-shadow: 0 0 10px rgba(0, 229, 176, 0.2); }
  .note-add { padding:0 18px; background:linear-gradient(135deg,var(--accent),#00b8ff); border:none; border-radius:10px; color:#000; font-size:22px; font-weight:700; cursor:pointer; }
  .notes-list { display:flex; flex-direction:column; gap:9px; }
  .note-item { background:var(--surface2); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:10px; padding:12px 14px; position:relative; }
  .note-text { font-size:14px; color:var(--text); line-height:1.5; padding-right:18px; }
  .note-date { font-size:10px; color:var(--muted); margin-top:6px; font-family:'Share Tech Mono',monospace; }
  .note-del { position:absolute; top:10px; right:10px; background:none; border:none; color:var(--danger); font-size:15px; cursor:pointer; opacity:0.4; }
  .note-del:hover { opacity:1; }
  .s-section { background:var(--surface2); border:1px solid var(--border); border-radius:13px; padding:18px; margin-bottom:14px; }
  .s-label { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:14px; font-family:'Share Tech Mono',monospace; }
  .s-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .s-row:last-child { margin-bottom:0; }
  .s-row label { font-size:13px; color:var(--muted); width:100px; flex-shrink:0; }
  .s-input { flex:1; background:var(--display-bg); border:1px solid var(--border); border-radius:8px; padding:9px 13px; color:var(--text); font-family:'Share Tech Mono',monospace; font-size:15px; letter-spacing:3px; outline:none; }
  .s-input:focus { border-color:var(--accent); box-shadow: 0 0 10px rgba(0, 229, 176, 0.2); }
  .s-save { width:100%; padding:12px; background:linear-gradient(135deg,var(--accent),#00b8ff); border:none; border-radius:9px; color:#000; font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700; cursor:pointer; margin-top:6px; }
  .s-del { width:100%; padding:12px; background:rgba(255,68,102,0.08); border:1px solid rgba(255,68,102,0.25); border-radius:9px; color:var(--danger); font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700; cursor:pointer; margin-top:6px; }
  .info { font-size:13px; color:var(--muted); line-height:1.8; }
  .info span { color:var(--accent); font-family:'Share Tech Mono',monospace; }
  .empty { text-align:center; padding:36px 18px; color:var(--muted); font-size:14px; }
  .empty .e-ico { font-size:44px; margin-bottom:10px; }
  .imgmodal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.93); z-index:200; align-items:center; justify-content:center; }
  .imgmodal.open { display:flex; }
  .imgmodal img { max-width:90vw; max-height:90vh; border-radius:12px; }
  .imgclose { position:fixed; top:18px; right:18px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:7px 13px; font-family:'Rajdhani',sans-serif; font-size:15px; cursor:pointer; }
  .toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 18px; font-size:13px; color:var(--text); z-index:999; transition:transform 0.3s ease; white-space:nowrap; font-family:'Rajdhani',sans-serif; pointer-events:none; }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="calc-wrap">

  <div class="display">
    <div class="mem-tag" id="memTag">M</div>
    <div class="hist" id="hist"></div>
    <div class="num-display" id="num">0</div>
  </div>

  <div class="toggle-strip">
    <button id="moreBtn" onclick="toggleMore()">+ MORE</button>
  </div>

  <div id="extraRows">
    <div class="row">
      <button class="sbtn mem" onclick="doMem('MC')">MC</button>
      <button class="sbtn mem" onclick="doMem('MR')">MR</button>
      <button class="sbtn mem" onclick="doMem('MS')">MS</button>
      <button class="sbtn mem" onclick="doMem('M+')">M+</button>
      <button class="sbtn mem" onclick="doMem('M-')">M-</button>
    </div>
    <div class="row">
      <button class="sbtn trig" onclick="doSci('sin')">sin</button>
      <button class="sbtn trig" onclick="doSci('cos')">cos</button>
      <button class="sbtn trig" onclick="doSci('tan')">tan</button>
      <button class="sbtn trig" onclick="doSci('asin')">sin⁻¹</button>
      <button class="sbtn trig" onclick="doSci('acos')">cos⁻¹</button>
    </div>
    <div class="row">
      <button class="sbtn trig" onclick="doSci('atan')">tan⁻¹</button>
      <button class="sbtn log"  onclick="doSci('log')">log</button>
      <button class="sbtn log"  onclick="doSci('ln')">ln</button>
      <button class="sbtn log"  onclick="doSci('ex')">eˣ</button>
      <button class="sbtn log"  onclick="doSci('10x')">10ˣ</button>
    </div>
    <div class="row">
      <button class="sbtn misc" onclick="doSci('sqrt')">√</button>
      <button class="sbtn misc" onclick="doSci('sq')">x²</button>
      <button class="sbtn misc" onclick="doSci('cb')">x³</button>
      <button class="sbtn misc" onclick="doSci('inv')">1/x</button>
      <button class="sbtn misc" onclick="doSci('fact')">n!</button>
    </div>
    <div class="row">
      <button class="sbtn misc" onclick="doSci('pi')">π</button>
      <button class="sbtn misc" onclick="doSci('e')">e</button>
      <button class="sbtn misc" onclick="doSci('abs')">|x|</button>
      <button class="sbtn misc" onclick="doOp('^')">xʸ</button>
      <button class="sbtn misc" onclick="doDel()">DEL</button>
    </div>
  </div>

  <div class="row">
    <button class="btn fn" onclick="doFn('C')">C</button>
    <button class="btn fn" onclick="doDel()">⌫</button>
    <button class="btn fn" onclick="doFn('pct')">%</button>
    <button class="btn op" onclick="doOp('/')">÷</button>
  </div>
  <div class="row">
    <button class="btn num" onclick="doNum('7')">7</button>
    <button class="btn num" onclick="doNum('8')">8</button>
    <button class="btn num" onclick="doNum('9')">9</button>
    <button class="btn op"  onclick="doOp('*')">×</button>
  </div>
  <div class="row">
    <button class="btn num" onclick="doNum('4')">4</button>
    <button class="btn num" onclick="doNum('5')">5</button>
    <button class="btn num" onclick="doNum('6')">6</button>
    <button class="btn op"  onclick="doOp('-')">−</button>
  </div>
  <div class="row">
    <button class="btn num" onclick="doNum('1')">1</button>
    <button class="btn num" onclick="doNum('2')">2</button>
    <button class="btn num" onclick="doNum('3')">3</button>
    <button class="btn op"  onclick="doOp('+')">+</button>
  </div>
  <div class="row">
    <button class="btn num zero" onclick="doNum('0')">0</button>
    <button class="btn num" onclick="doNum('.')">.</button>
    <button class="btn eq"  onclick="doEq()">=</button>
  </div>

</div>

<div id="vault">
  <div class="v-header">
    <div class="v-logo">
      <div class="v-icon">🔐</div>
      <div class="v-title">SECRET <span>VAULT</span></div>
    </div>
    <button class="lock-btn" onclick="lockVault()">🔒 Lock</button>
  </div>
  <div class="v-tabs">
    <div class="vtab on"  onclick="showTab('photos')">📷 Photos</div>
    <div class="vtab"     onclick="showTab('files')">📁 Files</div>
    <div class="vtab"     onclick="showTab('notes')">📝 Notes</div>
    <div class="vtab"     onclick="showTab('settings')">⚙️ Settings</div>
  </div>
  <div class="v-body">
    <div class="panel on" id="panel-photos"><div class="upzone"><input type="file" accept="image/*" multiple id="photoInput" onchange="addPhotos(this.files)"><div class="ico">📷</div><p>Click to <strong>add secret photos</strong></p></div><div class="photo-grid" id="photoGrid"></div></div>
    <div class="panel" id="panel-files"><div class="upzone"><input type="file" multiple onchange="addFiles(this.files)"><div class="ico">📁</div><p>Click to <strong style="color:#a78bfa">add secret files</strong></p></div><div class="file-list" id="fileList"></div></div>
    <div class="panel" id="panel-notes"><div class="note-area"><textarea class="note-input" id="noteInput" placeholder="Write a secret note..."></textarea><button class="note-add" onclick="addNote()">+</button></div><div class="notes-list" id="notesList"></div></div>
    <div class="panel" id="panel-settings"><div class="s-section"><div class="s-label">🔑 Change Password</div><div class="s-row"><label>Current Pass</label><input type="password" class="s-input" id="curPass" placeholder="••••" maxlength="20"></div><div class="s-row"><label>New Password</label><input type="password" class="s-input" id="newPass" placeholder="numbers only" maxlength="20"></div><div class="s-row"><label>Confirm</label><input type="password" class="s-input" id="cfmPass" placeholder="repeat" maxlength="20"></div><button class="s-save" onclick="changePass()">Save Password</button></div><div class="s-section"><div class="s-label">Danger Zone</div><button class="s-del" onclick="clearAll()">Delete All Vault Data</button></div><div class="s-section"><div class="s-label">How to Open Vault</div><div class="info">Type your <span>password</span> on calculator<br>then press <span>=</span> to open vault.<br><br>Default password: <span>1234</span></div></div></div>
  </div>
</div>
<div class="imgmodal" id="imgModal" onclick="closeImg()"><button class="imgclose">X Close</button><img id="modalImg" src="" alt=""></div>
<div class="toast" id="toast"></div>

<script>
var disp = '0', hist = '', cur = '', op = null, fresh = false, mem = 0, sciOpen = false;
function render() { var el = document.getElementById('num'); var h = document.getElementById('hist'); el.textContent = disp; h.textContent = hist; var l = disp.length; el.className = 'num-display' + (l > 14 ? ' xs' : l > 9 ? ' sm' : ''); var mt = document.getElementById('memTag'); mt.className = 'mem-tag' + (mem !== 0 ? ' show' : ''); }
function toggleMore() { sciOpen = !sciOpen; var extra = document.getElementById('extraRows'); var btn = document.getElementById('moreBtn'); if (sciOpen) { extra.style.display = 'block'; btn.textContent = '- LESS'; btn.className = 'active'; } else { extra.style.display = 'none'; btn.textContent = '+ MORE'; btn.className = ''; } }
function doNum(n) { if (n === '.' && disp.indexOf('.') !== -1) return; if (fresh) { disp = (n === '.') ? '0.' : n; fresh = false; } else { disp = (disp === '0' && n !== '.') ? n : disp + n; } render(); }
function doDel() { if (fresh) return; if (disp === 'Error' || disp === 'NaN' || disp === 'Infinity') { disp = '0'; } else if (disp.length > 1) { disp = disp.slice(0, -1); } else { disp = '0'; } render(); }
function doOp(o) { if (op !== null && !fresh) { doEq(true); } cur = disp; op = o; var sym = {'+':'+','-':'−','*':'×','/':'÷','^':'xʸ'}[o] || o; hist = disp + ' ' + sym; fresh = true; render(); }
function doEq(chain) { if (!chain) { var d = getData(); if (!op && disp === d.password) { openVault(); return; } } if (!op) return; var a = parseFloat(cur), b = parseFloat(disp), r; if (op === '+') r = a + b; else if (op === '-') r = a - b; else if (op === '*') r = a * b; else if (op === '/') r = b !== 0 ? a / b : NaN; else if (op === '^') r = Math.pow(a, b); else r = b; if (!chain) hist = cur + ' ' + ({'+':'+','-':'−','*':'×','/':'÷','^':'xʸ'}[op]||op) + ' ' + disp + ' ='; disp = isNaN(r) ? 'Error' : String(parseFloat(r.toFixed(10))); op = null; fresh = true; render(); }
function doFn(f) { if (f === 'C') { disp='0'; hist=''; cur=''; op=null; fresh=false; } if (f === 'pct') { disp = String(parseFloat(disp) / 100); } render(); }
function doSci(f) { var x = parseFloat(disp), r, deg = x * Math.PI / 180; if (f==='sin') r = Math.sin(deg); else if (f==='cos') r = Math.cos(deg); else if (f==='tan') r = Math.tan(deg); else if (f==='asin') r = Math.asin(x)*180/Math.PI; else if (f==='acos') r = Math.acos(x)*180/Math.PI; else if (f==='atan') r = Math.atan(x)*180/Math.PI; else if (f==='log') r = Math.log10(x); else if (f==='ln') r = Math.log(x); else if (f==='ex') r = Math.exp(x); else if (f==='10x') r = Math.pow(10, x); else if (f==='sqrt') r = Math.sqrt(x); else if (f==='sq') r = x*x; else if (f==='cb') r = x*x*x; else if (f==='inv') r = 1/x; else if (f==='abs') r = Math.abs(x); else if (f==='pi') { disp=String(Math.PI); fresh=true; render(); return; } else if (f==='e') { disp=String(Math.E); fresh=true; render(); return; } else if (f==='fact') { r=factorial(Math.round(x)); } else return; hist = f+'('+x+') ='; disp = isNaN(r) ? 'Error' : String(parseFloat(r.toFixed(10))); fresh = true; render(); }
function factorial(n) { if (n<0||n>170) return NaN; var r=1; for(var i=2;i<=n;i++) r*=i; return r; }
function doMem(f) { var x = parseFloat(disp); if (f==='MC') { mem=0; toast('Memory cleared'); } else if (f==='MR') { disp=String(mem); fresh=true; } else if (f==='MS') { mem=x; toast('Saved: '+x); } else if (f==='M+') { mem+=x; toast('Memory: '+mem); } else if (f==='M-') { mem-=x; toast('Memory: '+mem); } render(); }
function openVault() { disp='0'; hist=''; cur=''; op=null; fresh=false; render(); document.getElementById('vault').className = 'open'; showTab('photos'); renderPhotos(); renderFiles(); renderNotes(); }
function lockVault() { document.getElementById('vault').className = ''; toast('Vault locked'); }
function showTab(name) { document.querySelectorAll('.vtab').forEach(function(t,i){ t.className = 'vtab' + (['photos','files','notes','settings'][i]===name?' on':''); }); document.querySelectorAll('.panel').forEach(function(p){ p.className = 'panel'; }); document.getElementById('panel-'+name).className = 'panel on'; }
function getData() { try { return JSON.parse(localStorage.getItem('__vault') || '{"password":"1234","photos":[],"files":[],"notes":[]}'); } catch(e) { return {password:'1234',photos:[],files:[],notes:[]}; } }
function saveData(d) { localStorage.setItem('__vault', JSON.stringify(d)); }
function addPhotos(files) { var d=getData(), done=0, total=files.length; for(var i=0;i<total;i++) { (function(file){ var r=new FileReader(); r.onload=function(e){ d.photos.push({id:Date.now()+Math.random(),name:file.name,src:e.target.result}); done++; if(done===total){saveData(d);renderPhotos();toast(total+' photo(s) added');} }; r.readAsDataURL(file); })(files[i]); } document.getElementById('photoInput').value=''; }
function renderPhotos() { var d=getData(), g=document.getElementById('photoGrid'); if(!d.photos.length){g.innerHTML='<div class="empty"><div class="e-ico">📷</div>No photos yet.</div>';return;} g.innerHTML=d.photos.map(function(p){ return '<div class="photo-item"><img src="'+p.src+'" onclick="openImg(\''+p.src+'\')"><button class="photo-del" onclick="delPhoto(\''+p.id+'\')">X</button></div>'; }).join(''); }
function delPhoto(id) { var d=getData(); d.photos=d.photos.filter(function(p){return String(p.id)!==String(id);}); saveData(d);renderPhotos();toast('Photo deleted'); }
function openImg(src){document.getElementById('modalImg').src=src;document.getElementById('imgModal').className='imgmodal open';}
function closeImg(){document.getElementById('imgModal').className='imgmodal';}
function addFiles(files) { var d=getData(), done=0, total=files.length; for(var i=0;i<total;i++){ (function(file){ var r=new FileReader(); r.onload=function(e){ d.files.push({id:Date.now()+Math.random(),name:file.name,size:file.size,type:file.type,src:e.target.result}); done++; if(done===total){saveData(d);renderFiles();toast(total+' file(s) added');} }; r.readAsDataURL(file); })(files[i]); } }
function fileIco(t){ if(t.indexOf('image')===0) return '🖼️'; if(t.indexOf('video')===0) return '🎬'; if(t.indexOf('audio')===0) return '🎵'; if(t.indexOf('pdf')!==-1) return '📄'; return '📁'; }
function fmtSize(b){ if(b<1024) return b+'B'; if(b<1048576) return (b/1024).toFixed(1)+'KB'; return (b/1048576).toFixed(1)+'MB'; }
function renderFiles(){ var d=getData(), l=document.getElementById('fileList'); if(!d.files.length){l.innerHTML='<div class="empty"><div class="e-ico">📁</div>No files yet.</div>';return;} l.innerHTML=d.files.map(function(f){ return '<div class="file-item"><div class="file-ico">'+fileIco(f.type)+'</div><div class="file-info"><div class="file-name">'+f.name+'</div><div class="file-size">'+fmtSize(f.size)+'</div></div><a href="'+f.src+'" download="'+f.name+'" style="color:var(--accent);font-size:17px;text-decoration:none">⬇</a><button class="file-del" onclick="delFile(\''+f.id+'\')">🗑</button></div>'; }).join(''); }
function delFile(id){ var d=getData(); d.files=d.files.filter(function(f){return String(f.id)!==String(id);}); saveData(d);renderFiles();toast('File deleted'); }
function addNote(){ var t=document.getElementById('noteInput').value.trim(); if(!t) return; var d=getData(); d.notes.unshift({id:Date.now(),text:t,date:new Date().toLocaleString()}); saveData(d); document.getElementById('noteInput').value=''; renderNotes(); toast('Note saved'); }
function renderNotes(){ var d=getData(), l=document.getElementById('notesList'); if(!d.notes.length){l.innerHTML='<div class="empty"><div class="e-ico">📝</div>No notes yet.</div>';return;} l.innerHTML=d.notes.map(function(n){ return '<div class="note-item"><button class="note-del" onclick="delNote('+n.id+')">X</button><div class="note-text">'+n.text.replace(/</g,'&lt;')+'</div><div class="note-date">'+n.date+'</div></div>'; }).join(''); }
function delNote(id){ var d=getData(); d.notes=d.notes.filter(function(n){return n.id!==id;}); saveData(d);renderNotes(); }
function changePass(){ var c=document.getElementById('curPass').value; var n=document.getElementById('newPass').value; var f=document.getElementById('cfmPass').value; var d=getData(); if(c!==d.password){toast('Wrong current password!');return;} if(!n){toast('Enter new password!');return;} if(n!==f){toast('Passwords do not match!');return;} if(!/^\d+$/.test(n)){toast('Numbers only!');return;} d.password=n; saveData(d); document.getElementById('curPass').value=''; document.getElementById('newPass').value=''; document.getElementById('cfmPass').value=''; toast('Password changed to: '+n); }
function clearAll(){ if(!confirm('Delete ALL vault data? Cannot undo!')) return; var d=getData(); d.photos=[]; d.files=[]; d.notes=[]; saveData(d); renderPhotos(); renderFiles(); renderNotes(); toast('All data deleted'); }
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'; setTimeout(function(){t.className='toast';},2600); }
render();
</script>
</body>
